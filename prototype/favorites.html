<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 我的收藏</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; color: #1E293B; }
    .top-nav { display:flex; align-items:center; padding:0 24px; height:60px; background:#fff; box-shadow:0 1px 12px rgba(0,0,0,0.04); position:sticky; top:0; z-index:100; border-bottom:1px solid #F1F5F9; }
    .nav-logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-right:auto; }
    .nav-links { display:flex; gap:4px; }
    .nav-links a { text-decoration:none; color:#475569; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; transition:all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:#3B82F6; background:#EFF6FF; }
    .nav-actions { display:flex; align-items:center; gap:12px; margin-left:16px; }
    .container { max-width:1000px; margin:0 auto; padding:24px; }
    .breadcrumb { margin-bottom:20px; font-size:13px; color:#64748B; }
    .breadcrumb a { color:#3B82F6; text-decoration:none; }
    .page-header { margin-bottom:20px; }
    .page-header h2 { font-size:24px; font-weight:700; }
    .fav-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .fav-card { background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 1px 8px rgba(0,0,0,0.04); transition:all 0.2s; text-decoration:none; color:inherit; display:block; }
    .fav-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,0.1); }
    .fav-img { height:160px; background:#E2E8F0; position:relative; }
    .fav-img img { width:100%; height:100%; object-fit:cover; }
    .fav-remove { position:absolute; top:8px; right:8px; width:28px; height:28px; border-radius:50%; background:rgba(0,0,0,0.5); color:#fff; border:none; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
    .fav-body { padding:14px; }
    .fav-title { font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .fav-price { font-size:18px; font-weight:800; color:#EF4444; margin-top:6px; }
    .fav-meta { font-size:11px; color:#94A3B8; margin-top:4px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-nav">
      <div class="nav-logo">🏫 校园轻集市</div>
      <div class="nav-links">
        <a href="home.html">首页</a>
        <a href="category.html">分类浏览</a>
        <a href="publish.html">发布信息</a>
        <a href="messages.html">消息</a>
        <a href="profile.html" class="active">个人中心</a>
      </div>
      <div class="nav-actions">
        <el-button size="small" type="primary" onclick="location.href='login.html'">登录</el-button>
      </div>
    </div>

    <div class="container">
      <div class="breadcrumb">
        <a href="home.html">首页</a><span>/</span><a href="profile.html">个人中心</a><span>/</span><span style="color:#1E293B;">我的收藏</span>
      </div>

      <div class="page-header"><h2>⭐ 我的收藏（{{ favorites.length }}条）</h2></div>

      <div class="fav-grid">
        <a v-for="f in favorites" :key="f.id" :href="f.link" class="fav-card">
          <div class="fav-img">
            <img :src="f.image" alt="">
            <button class="fav-remove" @click.prevent="removeFav(f)">✕</button>
          </div>
          <div class="fav-body">
            <div class="fav-title">{{ f.title }}</div>
            <div class="fav-price">{{ f.price }}</div>
            <div class="fav-meta">
              <el-tag size="small" :type="f.tagType">{{ f.tag }}</el-tag>
              <span style="margin-left:6px;">📍 {{ f.location }}</span>
            </div>
          </div>
        </a>
      </div>

      <div v-if="favorites.length===0" style="text-align:center;padding:80px 20px;color:#64748B;">
        <div style="font-size:64px;margin-bottom:16px;">⭐</div>
        <p style="font-size:15px;">还没有收藏任何内容</p>
        <el-button type="primary" style="margin-top:12px;" onclick="location.href='home.html'">去浏览</el-button>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue
    const app = createApp({
      setup() {
        const favorites = ref([
          { id:1, title:'Cherry MX 青轴机械键盘 毕业出', price:'¥150', tag:'二手', tagType:'primary', location:'校本部2号楼', image:'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400&h=300&fit=crop', link:'item-detail.html' },
          { id:2, title:'Dell U2419H 24寸2K显示器', price:'¥600', tag:'二手', tagType:'primary', location:'校本部3号楼', image:'https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400&h=300&fit=crop', link:'item-detail.html' },
          { id:3, title:'东区食堂拼奶茶 还差2人', price:'人均¥18', tag:'拼单', tagType:'success', location:'东区食堂', image:'https://images.unsplash.com/photo-1558857563-b371033873b8?w=400&h=300&fit=crop', link:'group-detail.html' },
          { id:4, title:'帮取快递到6栋宿舍', price:'酬谢¥5', tag:'跑腿', tagType:'warning', location:'西门菜鸟驿站', image:'https://images.unsplash.com/photo-1580674684081-7617fbf3d745?w=400&h=300&fit=crop', link:'task-detail.html' },
          { id:5, title:'吉他 Yamaha F310 入门神器', price:'¥450', tag:'二手', tagType:'primary', location:'校本部4号楼', image:'https://images.unsplash.com/photo-1510915361894-db8b60106cb1?w=400&h=300&fit=crop', link:'item-detail.html' },
        ])
        function removeFav(f) {
          favorites.value = favorites.value.filter(x => x.id !== f.id)
          ElementPlus.ElMessage.success('已取消收藏')
        }
        return { favorites, removeFav }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
</script>
</body>
</html>
