<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 我的收藏</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#F1F5F9; color:#1E293B; }
    a { text-decoration:none; }
    .top-nav { display:flex; align-items:center; padding:0 28px; height:64px; background:#fff; position:sticky; top:0; z-index:100; border-bottom:1px solid #E2E8F0; box-shadow:0 1px 12px rgba(0,0,0,0.03); }
    .nav-logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-right:auto; display:flex; align-items:center; gap:6px; }
    .nav-logo .logo-icon { font-size:26px; -webkit-text-fill-color:initial; }
    .nav-links { display:flex; gap:2px; }
    .nav-links a { text-decoration:none; color:#475569; padding:8px 18px; border-radius:8px; font-size:14px; font-weight:500; transition:all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:#3B82F6; background:#EFF6FF; }
    .nav-actions { display:flex; align-items:center; gap:12px; margin-left:18px; }
    .container { max-width:1040px; margin:0 auto; padding:24px; }
    .breadcrumb { margin-bottom:20px; font-size:13px; color:#64748B; display:flex; align-items:center; gap:6px; }
    .breadcrumb a { color:#3B82F6; }
    .breadcrumb .sep { color:#CBD5E1; }
    .page-hd { margin-bottom:20px; }
    .page-hd h2 { font-size:24px; font-weight:700; }
    .fav-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .fav-card { background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.03); transition:all 0.25s; display:block; color:inherit; border:1px solid #F1F5F9; position:relative; }
    .fav-card:hover { transform:translateY(-4px); box-shadow:0 10px 30px rgba(0,0,0,0.1); }
    .fav-img { height:175px; background:#E2E8F0; overflow:hidden; }
    .fav-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
    .fav-card:hover .fav-img img { transform:scale(1.05); }
    .fav-remove { position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:50%; background:rgba(0,0,0,0.45); color:#fff; border:none; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; z-index:2; transition:all 0.2s; }
    .fav-remove:hover { background:rgba(0,0,0,0.7); }
    .fav-body { padding:15px; }
    .fav-title { font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:6px; }
    .fav-price { font-size:20px; font-weight:800; color:#EF4444; }
    .fav-meta { font-size:11px; color:#94A3B8; margin-top:5px; display:flex; align-items:center; gap:8px; }
    .footer-bar { background:#fff; border-top:1px solid #E2E8F0; margin-top:40px; padding:24px; text-align:center; }
    .footer-bar p { font-size:12px; color:#94A3B8; line-height:1.8; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-nav">
      <div class="nav-logo"><span class="logo-icon">🏫</span> 校园轻集市</div>
      <div class="nav-links">
        <a href="home.html">首页</a> <a href="category.html">分类浏览</a> <a href="publish.html">发布信息</a> <a href="messages.html">消息</a> <a href="profile.html" class="active">个人中心</a>
      </div>
      <div class="nav-actions">
        <el-button size="default" type="primary" onclick="location.href='login.html'">登录</el-button>
      </div>
    </div>

    <div class="container">
      <div class="breadcrumb">
        <a href="home.html">首页</a><span class="sep">/</span><a href="profile.html">个人中心</a><span class="sep">/</span><span style="color:#1E293B;font-weight:500;">我的收藏</span>
      </div>
      <div class="page-hd"><h2>⭐ 我的收藏（{{ favorites.length }}条）</h2></div>

      <div class="fav-grid">
        <a v-for="f in favorites" :key="f.id" :href="f.link" class="fav-card">
          <div class="fav-img"><img :src="f.image" alt="">
            <button class="fav-remove" @click.prevent="removeFav(f)">✕</button>
          </div>
          <div class="fav-body">
            <div class="fav-title">{{ f.title }}</div>
            <div class="fav-price">{{ f.price }}</div>
            <div class="fav-meta">
              <el-tag size="small" :type="f.tagType">{{ f.tag }}</el-tag>
              <span>📍 {{ f.location }}</span>
            </div>
          </div>
        </a>
      </div>

      <div v-if="favorites.length===0" style="text-align:center;padding:100px;color:#94A3B8;">
        <el-empty description="还没有收藏任何内容" image-size="80">
          <template #image><span style="font-size:72px;">⭐</span></template>
          <template #default><el-button type="primary" onclick="location.href='home.html'">去浏览</el-button></template>
        </el-empty>
      </div>
    </div>

    <div class="footer-bar">
      <p>© 2026 校园轻集市 · 为校园生活而生</p>
      <p><a href="home.html">返回首页</a></p>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue
    const app = createApp({
      setup() {
        const favorites = ref([
          { id:1, title:'Cherry MX 青轴机械键盘 毕业出', price:'¥150', tag:'二手', tagType:'primary', location:'校本部2号楼', image:'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400&h=320&fit=crop', link:'item-detail.html' },
          { id:2, title:'Dell U2419H 24寸2K显示器', price:'¥600', tag:'二手', tagType:'primary', location:'校本部3号楼', image:'https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400&h=320&fit=crop', link:'item-detail.html' },
          { id:3, title:'东区食堂霸王茶姬拼奶茶 还差2人', price:'人均¥18', tag:'拼单', tagType:'success', location:'东区食堂', image:'https://images.unsplash.com/photo-1558857563-b371033873b8?w=400&h=320&fit=crop', link:'group-detail.html' },
          { id:4, title:'帮取中通快递到6栋宿舍', price:'酬谢¥5', tag:'跑腿', tagType:'warning', location:'西门菜鸟驿站', image:'https://images.unsplash.com/photo-1580674684081-7617fbf3d745?w=400&h=320&fit=crop', link:'task-detail.html' },
          { id:5, title:'吉他 Yamaha F310 入门神器', price:'¥450', tag:'二手', tagType:'primary', location:'校本部4号楼', image:'https://images.unsplash.com/photo-1510915361894-db8b60106cb1?w=400&h=320&fit=crop', link:'item-detail.html' },
        ])
        function removeFav(f) {
          favorites.value = favorites.value.filter(x => x.id !== f.id)
          ElementPlus.ElMessage.success('已取消收藏')
        }
        return { favorites, removeFav }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
  </script>
</body>
</html>
