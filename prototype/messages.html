<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 消息列表</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#F1F5F9; color:#1E293B; }
    a { text-decoration:none; }
    .top-nav { display:flex; align-items:center; padding:0 28px; height:64px; background:#fff; position:sticky; top:0; z-index:100; border-bottom:1px solid #E2E8F0; box-shadow:0 1px 12px rgba(0,0,0,0.03); }
    .nav-logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-right:auto; display:flex; align-items:center; gap:6px; }
    .nav-logo .logo-icon { font-size:26px; -webkit-text-fill-color:initial; }
    .nav-links { display:flex; gap:2px; }
    .nav-links a { text-decoration:none; color:#475569; padding:8px 18px; border-radius:8px; font-size:14px; font-weight:500; transition:all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:#3B82F6; background:#EFF6FF; }
    .nav-actions { display:flex; align-items:center; gap:12px; margin-left:18px; }
    .container { max-width:1080px; margin:0 auto; padding:24px; }
    .page-hd h2 { font-size:24px; font-weight:700; }
    .msg-layout { display:grid; grid-template-columns:360px 1fr; gap:20px; min-height:580px; }
    .msg-list { background:#fff; border-radius:16px; box-shadow:0 1px 6px rgba(0,0,0,0.03); overflow:hidden; display:flex; flex-direction:column; border:1px solid #F1F5F9; }
    .msg-search { padding:16px; border-bottom:1px solid #F1F5F9; }
    .msg-items { flex:1; overflow-y:auto; }
    .msg-item { display:flex; align-items:center; gap:12px; padding:14px 18px; cursor:pointer; border-bottom:1px solid #F8FAFC; transition:all 0.15s; text-decoration:none; color:inherit; }
    .msg-item:hover { background:#F8FAFC; }
    .msg-item.active { background:#EFF6FF; }
    .msg-item.unread { background:#FFFBEB; }
    .msg-avt { width:46px; height:46px; border-radius:14px; overflow:hidden; background:#E2E8F0; flex-shrink:0; }
    .msg-avt img { width:100%; height:100%; object-fit:cover; }
    .msg-mid { flex:1; min-width:0; }
    .msg-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
    .msg-name { font-size:14px; font-weight:600; }
    .msg-time { font-size:11px; color:#94A3B8; }
    .msg-tag { font-size:11px; color:#3B82F6; background:#EFF6FF; padding:1px 7px; border-radius:4px; display:inline-block; margin-bottom:3px; }
    .msg-prev { font-size:12px; color:#64748B; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .msg-dot { width:9px; height:9px; border-radius:50%; background:#EF4444; flex-shrink:0; }
    .msg-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; background:#fff; border-radius:16px; box-shadow:0 1px 6px rgba(0,0,0,0.03); color:#94A3B8; border:1px solid #F1F5F9; }
    .footer-bar { background:#fff; border-top:1px solid #E2E8F0; margin-top:40px; padding:24px; text-align:center; }
    .footer-bar p { font-size:12px; color:#94A3B8; line-height:1.8; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-nav">
      <div class="nav-logo"><span class="logo-icon">🏫</span> 校园轻集市</div>
      <div class="nav-links">
        <a href="home.html">首页</a> <a href="category.html">分类浏览</a> <a href="publish.html">发布信息</a>
        <a href="messages.html" class="active">消息<span v-if="unreadTotal>0" style="background:#EF4444;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:5px;">{{unreadTotal}}</span></a>
        <a href="profile.html">个人中心</a>
      </div>
      <div class="nav-actions">
        <el-button size="default" type="primary" onclick="location.href='login.html'">登录</el-button>
      </div>
    </div>

    <div class="container">
      <div class="page-hd" style="margin-bottom:20px;"><h2>💬 消息中心</h2></div>

      <div class="msg-layout">
        <div class="msg-list">
          <div class="msg-search">
            <el-input v-model="searchText" placeholder="搜索联系人..." clearable size="default"><template #prefix>🔍</template></el-input>
          </div>
          <div class="msg-items">
            <a v-for="m in filteredMsgs" :key="m.id" :href="'chat.html?id='+m.id" :class="['msg-item',selectedId===m.id?'active':'',m.unread?'unread':'']" @click.prevent="selectMsg(m)">
              <div class="msg-avt"><img :src="m.avatar" alt=""></div>
              <div class="msg-mid">
                <div class="msg-top"><span class="msg-name">{{ m.name }}</span><span class="msg-time">{{ m.time }}</span></div>
                <span class="msg-tag">{{ m.subject }}</span>
                <div class="msg-prev">{{ m.preview }}</div>
              </div>
              <span v-if="m.unread" class="msg-dot"></span>
            </a>
          </div>
        </div>

        <div class="msg-empty">
          <el-empty description="选择一条消息查看详情" image-size="80">
            <template #image><span style="font-size:64px;">💌</span></template>
          </el-empty>
        </div>
      </div>
    </div>

    <div class="footer-bar">
      <p>© 2026 校园轻集市 · 为校园生活而生</p>
      <p><a href="home.html">返回首页</a></p>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue
    const app = createApp({
      setup() {
        const searchText = ref('')
        const selectedId = ref(null)
        const messages = ref([
          { id:1, name:'李同学', subject:'二手自行车', preview:'你好，请问自行车还在吗？价格能优惠些吗？', time:'10:30', unread:true, avatar:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop' },
          { id:2, name:'王同学', subject:'机械键盘', preview:'键盘200元出吗？我就在校本部可以当面来看。', time:'11:15', unread:true, avatar:'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=100&h=100&fit=crop' },
          { id:3, name:'系统通知', subject:'平台通知', preview:'欢迎来到校园轻集市！你发布的"二手自行车"已有328次浏览。', time:'昨天', unread:false, avatar:'https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=100&h=100&fit=crop' },
          { id:4, name:'赵同学', subject:'床上折叠桌', preview:'折叠桌还在吗，可以便宜点吗？我就在隔壁楼随时可以过来。', time:'昨天', unread:true, avatar:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop' },
          { id:5, name:'拼单群聊-奶茶', subject:'霸王茶姬拼单', preview:'王同学：我确认参加，选伯牙绝弦～今天下午见！', time:'周一', unread:false, avatar:'https://images.unsplash.com/photo-1558857563-b371033873b8?w=100&h=100&fit=crop' },
          { id:6, name:'跑腿接单-小刘', subject:'取快递任务', preview:'好的，我马上去西门菜鸟驿站取，大概15分钟送到6栋。', time:'周一', unread:false, avatar:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop' },
        ])
        const unreadTotal = computed(() => messages.value.filter(m => m.unread).length)
        const filteredMsgs = computed(() => {
          if (!searchText.value) return messages.value
          return messages.value.filter(m => m.name.includes(searchText.value) || m.preview.includes(searchText.value))
        })
        function selectMsg(m) {
          selectedId.value = m.id
          m.unread = false
          setTimeout(() => location.href = 'chat.html?id=' + m.id, 300)
        }
        return { searchText, selectedId, messages, unreadTotal, filteredMsgs, selectMsg }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
  </script>
</body>
</html>
