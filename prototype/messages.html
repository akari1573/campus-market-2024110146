<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 消息列表</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; color: #1E293B; }
    .top-nav { display:flex; align-items:center; padding:0 24px; height:60px; background:#fff; box-shadow:0 1px 12px rgba(0,0,0,0.04); position:sticky; top:0; z-index:100; border-bottom:1px solid #F1F5F9; }
    .nav-logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-right:auto; }
    .nav-links { display:flex; gap:4px; }
    .nav-links a { text-decoration:none; color:#475569; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; transition:all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:#3B82F6; background:#EFF6FF; }
    .nav-actions { display:flex; align-items:center; gap:12px; margin-left:16px; }
    .container { max-width:1100px; margin:0 auto; padding:24px; }
    .page-header { margin-bottom:20px; }
    .page-header h2 { font-size:24px; font-weight:700; }
    .msg-layout { display:grid; grid-template-columns:360px 1fr; gap:20px; height:600px; }
    .msg-list { background:#fff; border-radius:14px; box-shadow:0 1px 8px rgba(0,0,0,0.04); overflow:hidden; display:flex; flex-direction:column; }
    .msg-search { padding:16px; border-bottom:1px solid #F1F5F9; }
    .msg-items { flex:1; overflow-y:auto; }
    .msg-item { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; border-bottom:1px solid #F1F5F9; transition:background 0.15s; text-decoration:none; color:inherit; }
    .msg-item:hover, .msg-item.active { background:#EFF6FF; }
    .msg-item.unread { background:#FFFBEB; }
    .msg-avatar { width:44px; height:44px; border-radius:12px; overflow:hidden; background:#E2E8F0; flex-shrink:0; }
    .msg-avatar img { width:100%; height:100%; object-fit:cover; }
    .msg-content { flex:1; min-width:0; }
    .msg-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
    .msg-name { font-size:14px; font-weight:600; }
    .msg-time { font-size:11px; color:#94A3B8; }
    .msg-subject { font-size:12px; color:#3B82F6; background:#EFF6FF; padding:1px 8px; border-radius:4px; display:inline-block; margin-bottom:4px; }
    .msg-preview { font-size:13px; color:#64748B; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .msg-dot { width:8px; height:8px; border-radius:50%; background:#EF4444; flex-shrink:0; }
    .msg-detail-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; background:#fff; border-radius:14px; box-shadow:0 1px 8px rgba(0,0,0,0.04); color:#64748B; }
    .empty-icon { font-size:64px; margin-bottom:16px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-nav">
      <div class="nav-logo">🏫 校园轻集市</div>
      <div class="nav-links">
        <a href="home.html">首页</a>
        <a href="category.html">分类浏览</a>
        <a href="publish.html">发布信息</a>
        <a href="messages.html" class="active">消息<span v-if="unreadTotal>0" style="background:#EF4444;color:#fff;border-radius:10px;padding:1px 6px;font-size:11px;margin-left:4px;">{{unreadTotal}}</span></a>
        <a href="profile.html">个人中心</a>
      </div>
      <div class="nav-actions">
        <el-button size="small" type="primary" onclick="location.href='login.html'">登录</el-button>
      </div>
    </div>

    <div class="container">
      <div class="page-header"><h2>💬 消息中心</h2></div>

      <div class="msg-layout">
        <div class="msg-list">
          <div class="msg-search">
            <el-input v-model="searchText" placeholder="搜索联系人..." clearable size="default">
              <template #prefix>🔍</template>
            </el-input>
          </div>
          <div class="msg-items">
            <a v-for="m in filteredMsgs" :key="m.id" :href="'chat.html?id='+m.id" :class="['msg-item', selectedId===m.id?'active':'', m.unread?'unread':'']" @click.prevent="selectMsg(m)">
              <div class="msg-avatar"><img :src="m.avatar" alt=""></div>
              <div class="msg-content">
                <div class="msg-top">
                  <span class="msg-name">{{ m.name }}</span>
                  <span class="msg-time">{{ m.time }}</span>
                </div>
                <span class="msg-subject">{{ m.subject }}</span>
                <div class="msg-preview">{{ m.preview }}</div>
              </div>
              <span v-if="m.unread" class="msg-dot"></span>
            </a>
          </div>
        </div>

        <div class="msg-detail-empty">
          <span class="empty-icon">💌</span>
          <p style="font-size:15px;">选择一条消息查看详情</p>
          <p style="font-size:12px;color:#94A3B8;margin-top:4px;">点击左侧会话进入聊天</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue
    const app = createApp({
      setup() {
        const searchText = ref('')
        const selectedId = ref(null)
        const messages = ref([
          { id:1, name:'李同学', subject:'二手自行车', preview:'你好，请问自行车还在吗？价格能优惠些吗？', time:'10:30', unread:true, avatar:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop' },
          { id:2, name:'王同学', subject:'机械键盘', preview:'键盘200元出吗？我就在校本部。', time:'11:15', unread:true, avatar:'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=80&h=80&fit=crop' },
          { id:3, name:'系统通知', subject:'系统通知', preview:'欢迎来到校园轻集市！你发布的"二手自行车"已有328次浏览。', time:'昨天', unread:false, avatar:'https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=80&h=80&fit=crop' },
          { id:4, name:'赵同学', subject:'床上折叠桌', preview:'折叠桌还在吗，可以便宜点吗？我就在隔壁楼。', time:'昨天', unread:true, avatar:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop' },
          { id:5, name:'拼单群聊-奶茶', subject:'霸王茶姬拼单', preview:'王同学：我确认参加，选伯牙绝弦～', time:'周一', unread:false, avatar:'https://images.unsplash.com/photo-1558857563-b371033873b8?w=80&h=80&fit=crop' },
          { id:6, name:'跑腿接单-小刘', subject:'取快递任务', preview:'好的，我马上去西门菜鸟驿站取，大概15分钟送到。', time:'周一', unread:false, avatar:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80&h=80&fit=crop' },
        ])
        const unreadTotal = computed(() => messages.value.filter(m => m.unread).length)
        const filteredMsgs = computed(() => {
          if (!searchText.value) return messages.value
          return messages.value.filter(m => m.name.includes(searchText.value) || m.preview.includes(searchText.value))
        })
        function selectMsg(m) {
          selectedId.value = m.id
          m.unread = false
          setTimeout(() => location.href = 'chat.html?id=' + m.id, 300)
        }
        return { searchText, selectedId, messages, unreadTotal, filteredMsgs, selectMsg }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
</script>
</body>
</html>
