<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 发布跑腿委托</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#F1F5F9; color:#1E293B; }
    a { text-decoration:none; }
    .top-nav { display:flex; align-items:center; padding:0 28px; height:64px; background:#fff; position:sticky; top:0; z-index:100; border-bottom:1px solid #E2E8F0; box-shadow:0 1px 12px rgba(0,0,0,0.03); }
    .nav-logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-right:auto; display:flex; align-items:center; gap:6px; }
    .nav-logo .logo-icon { font-size:26px; -webkit-text-fill-color:initial; }
    .nav-links { display:flex; gap:2px; }
    .nav-links a { text-decoration:none; color:#475569; padding:8px 18px; border-radius:8px; font-size:14px; font-weight:500; transition:all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:#3B82F6; background:#EFF6FF; }
    .nav-actions { display:flex; align-items:center; gap:12px; margin-left:18px; }
    .container { max-width:1120px; margin:0 auto; padding:24px; }
    .breadcrumb { margin-bottom:20px; font-size:13px; color:#64748B; display:flex; align-items:center; gap:6px; }
    .breadcrumb a { color:#3B82F6; }
    .breadcrumb .sep { color:#CBD5E1; }
    .publish-grid { display:grid; grid-template-columns:1fr 300px; gap:24px; }
    .form-card { background:#fff; border-radius:18px; padding:34px; box-shadow:0 1px 8px rgba(0,0,0,0.04); border:1px solid #F1F5F9; }
    .form-title { font-size:22px; font-weight:700; margin-bottom:28px; padding-bottom:18px; border-bottom:2px solid #F1F5F9; display:flex; align-items:center; gap:8px; }
    .form-group { margin-bottom:22px; }
    .form-label { display:block; font-size:14px; font-weight:600; color:#1E293B; margin-bottom:7px; }
    .form-label .req { color:#EF4444; }
    .form-hint { font-size:12px; color:#94A3B8; margin-top:5px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .side-card { background:#fff; border-radius:16px; padding:22px; box-shadow:0 1px 8px rgba(0,0,0,0.04); margin-bottom:16px; border:1px solid #F1F5F9; }
    .side-card h3 { font-size:16px; font-weight:700; margin-bottom:14px; }
    .side-card ul { font-size:13px; color:#475569; line-height:2; padding-left:18px; }
    .footer-bar { background:#fff; border-top:1px solid #E2E8F0; margin-top:40px; padding:24px; text-align:center; }
    .footer-bar p { font-size:12px; color:#94A3B8; line-height:1.8; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-nav">
      <div class="nav-logo"><span class="logo-icon">🏫</span> 校园轻集市</div>
      <div class="nav-links">
        <a href="home.html">首页</a> <a href="category.html">分类浏览</a> <a href="publish.html" class="active">发布信息</a> <a href="messages.html">消息</a> <a href="profile.html">个人中心</a>
      </div>
      <div class="nav-actions">
        <el-button size="default" type="primary" onclick="location.href='login.html'">登录</el-button>
      </div>
    </div>

    <div class="container">
      <div class="breadcrumb">
        <a href="home.html">首页</a><span class="sep">/</span><a href="publish.html">发布信息</a><span class="sep">/</span><span style="color:#1E293B;font-weight:500;">发布跑腿委托</span>
      </div>

      <div class="publish-grid">
        <div class="form-card">
          <div class="form-title">🏃 发布跑腿委托</div>

          <div class="form-group">
            <label class="form-label">任务类型 <span class="req">*</span></label>
            <el-select v-model="form.type" placeholder="请选择任务类型" style="width:100%;">
              <el-option label="📦 代取快递" value="pickup"></el-option>
              <el-option label="🍱 代买饭菜/零食" value="food"></el-option>
              <el-option label="📋 代办事务（打印/交材料等）" value="errand"></el-option>
              <el-option label="🏃 校园速递（送东西）" value="delivery"></el-option>
              <el-option label="其他" value="other"></el-option>
            </el-select>
          </div>

          <div class="form-group">
            <label class="form-label">任务标题 <span class="req">*</span></label>
            <el-input v-model="form.title" placeholder="例如：帮取中通快递到 6 栋宿舍" maxlength="60" show-word-limit></el-input>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">任务报酬 (元) <span class="req">*</span></label>
              <el-input-number v-model="form.reward" :min="1" :max="200" style="width:100%;"></el-input-number>
              <div class="form-hint">建议 3-20 元，合理定价更容易被接单</div>
            </div>
            <div class="form-group">
              <label class="form-label">期望完成时间 <span class="req">*</span></label>
              <el-date-picker v-model="form.deadline" type="datetime" placeholder="选择时间" style="width:100%;"></el-date-picker>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">取件/起始地址 <span class="req">*</span></label>
              <el-input v-model="form.fromAddr" placeholder="例如：西门菜鸟驿站"></el-input>
            </div>
            <div class="form-group">
              <label class="form-label">送达地址 <span class="req">*</span></label>
              <el-input v-model="form.toAddr" placeholder="例如：校本部 6 栋宿舍楼下"></el-input>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">任务描述 <span class="req">*</span></label>
            <el-input v-model="form.desc" type="textarea" :rows="4" placeholder="详细描述任务内容、快递信息、物品大小、特殊要求等..." maxlength="300" show-word-limit></el-input>
          </div>

          <div class="form-group">
            <label class="form-label">联系方式 <span class="req">*</span></label>
            <el-input v-model="form.contact" placeholder="手机号 / QQ / 微信，方便接单者联系你"></el-input>
          </div>

          <div style="display:flex;gap:12px;padding-top:8px;">
            <el-button type="warning" size="large" style="min-width:180px;" @click="submitForm">💨 发布委托</el-button>
            <el-button size="large" style="min-width:120px;">💾 保存草稿</el-button>
            <div style="flex:1;"></div>
            <el-button size="large" onclick="location.href='publish.html'">取消</el-button>
          </div>
        </div>

        <div>
          <div class="side-card">
            <h3>📋 发布须知</h3>
            <ul>
              <li>报酬建议合理设置（3-20元）</li>
              <li>明确任务内容和特殊要求</li>
              <li>提供准确的地址信息</li>
              <li>任务完成后及时确认评价</li>
              <li>不要发布违禁物品相关任务</li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-bar">
      <p>© 2026 校园轻集市 · 为校园生活而生</p>
      <p><a href="home.html">返回首页</a></p>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive } = Vue
    const app = createApp({
      setup() {
        const form = reactive({ type:'', title:'', reward:5, deadline:'', fromAddr:'', toAddr:'', desc:'', contact:'' })
        function submitForm() {
          if (!form.title.trim()) { ElementPlus.ElMessage.warning('请填写任务标题'); return }
          if (!form.type) { ElementPlus.ElMessage.warning('请选择任务类型'); return }
          if (!form.fromAddr.trim()) { ElementPlus.ElMessage.warning('请填写起始地址'); return }
          ElementPlus.ElMessage.success('✅ 跑腿委托发布成功！即将跳转到首页...')
          setTimeout(() => location.href='home.html', 1500)
        }
        return { form, submitForm }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
  </script>
</body>
</html>
