<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 发布失物招领</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; color: #1E293B; }
    .top-nav { display:flex; align-items:center; padding:0 24px; height:60px; background:#fff; box-shadow:0 1px 12px rgba(0,0,0,0.04); position:sticky; top:0; z-index:100; border-bottom:1px solid #F1F5F9; }
    .nav-logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-right:auto; }
    .nav-links { display:flex; gap:4px; }
    .nav-links a { text-decoration:none; color:#475569; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; transition:all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:#3B82F6; background:#EFF6FF; }
    .nav-actions { display:flex; align-items:center; gap:12px; margin-left:16px; }
    .container { max-width:1100px; margin:0 auto; padding:24px; }
    .breadcrumb { margin-bottom:20px; font-size:13px; color:#64748B; }
    .breadcrumb a { color:#3B82F6; text-decoration:none; }
    .publish-grid { display:grid; grid-template-columns:1fr 300px; gap:24px; }
    .form-card { background:#fff; border-radius:16px; padding:32px; box-shadow:0 1px 8px rgba(0,0,0,0.04); }
    .form-title { font-size:22px; font-weight:700; margin-bottom:28px; padding-bottom:16px; border-bottom:2px solid #F1F5F9; }
    .form-group { margin-bottom:20px; }
    .form-label { display:block; font-size:14px; font-weight:600; color:#1E293B; margin-bottom:6px; }
    .form-label .required { color:#EF4444; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .upload-area { border:2px dashed #CBD5E1; border-radius:12px; padding:24px; text-align:center; cursor:pointer; transition:all 0.2s; }
    .upload-area:hover { border-color:#3B82F6; background:#EFF6FF; }
    .type-toggle { display:flex; gap:0; margin-bottom:24px; background:#F1F5F9; border-radius:10px; padding:4px; width:fit-content; }
    .type-btn { padding:10px 28px; border:none; background:transparent; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; color:#64748B; }
    .type-btn.active { background:#fff; color:#1E293B; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
    .type-btn.active.lost { color:#DC2626; }
    .type-btn.active.found { color:#059669; }
    .side-card { background:#fff; border-radius:14px; padding:20px; box-shadow:0 1px 8px rgba(0,0,0,0.04); margin-bottom:16px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-nav">
      <div class="nav-logo">🏫 校园轻集市</div>
      <div class="nav-links">
        <a href="home.html">首页</a>
        <a href="category.html">分类浏览</a>
        <a href="publish.html" class="active">发布信息</a>
        <a href="messages.html">消息</a>
        <a href="profile.html">个人中心</a>
      </div>
      <div class="nav-actions">
        <el-button size="small" type="primary" onclick="location.href='login.html'">登录</el-button>
      </div>
    </div>

    <div class="container">
      <div class="breadcrumb">
        <a href="home.html">首页</a><span>/</span><a href="publish.html">发布信息</a><span>/</span><span style="color:#1E293B;">发布失物招领</span>
      </div>

      <div class="publish-grid">
        <div class="form-card">
          <div class="form-title">🔍 发布失物招领</div>

          <div class="type-toggle">
            <button :class="['type-btn', 'lost', formType==='lost'?'active':'']" @click="formType='lost'">😢 发布失物</button>
            <button :class="['type-btn', 'found', formType==='found'?'active':'']" @click="formType='found'">🙌 发布招领</button>
          </div>

          <div class="form-group">
            <label class="form-label">{{ formType==='lost'?'物品图片':'拾到物品图片' }}</label>
            <div class="upload-area">
              <div style="font-size:32px;margin-bottom:8px;">📷</div>
              <div style="font-size:13px;color:#64748B;">上传图片有助于更快找到</div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">{{ formType==='lost'?'丢失物品名称':'拾到物品名称' }} <span class="required">*</span></label>
            <el-input v-model="form.title" placeholder="例如：黑色 AirPods Pro 充电盒" maxlength="50"></el-input>
          </div>

          <div class="form-group">
            <label class="form-label">物品分类 <span class="required">*</span></label>
            <el-select v-model="form.category" placeholder="请选择分类" style="width:100%;">
              <el-option label="证件/卡片" value="card"></el-option>
              <el-option label="数码/电子" value="digital"></el-option>
              <el-option label="钥匙/饰品" value="accessory"></el-option>
              <el-option label="书籍/文具" value="stationery"></el-option>
              <el-option label="衣物/箱包" value="clothing"></el-option>
              <el-option label="生活用品" value="life"></el-option>
              <el-option label="其他" value="other"></el-option>
            </el-select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">{{ formType==='lost'?'丢失地点':'拾到地点' }} <span class="required">*</span></label>
              <el-input v-model="form.location" placeholder="例如：校本部西门打印店"></el-input>
            </div>
            <div class="form-group">
              <label class="form-label">{{ formType==='lost'?'丢失时间':'拾到时间' }} <span class="required">*</span></label>
              <el-date-picker v-model="form.time" type="datetime" placeholder="选择日期时间" style="width:100%;"></el-date-picker>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">特征描述 <span class="required">*</span></label>
            <el-input v-model="form.desc" type="textarea" :rows="4" placeholder="请详细描述物品的外观特征、颜色、品牌、特殊标记等，便于确认身份..." maxlength="300" show-word-limit></el-input>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">联系方式 <span class="required">*</span></label>
              <el-input v-model="form.contact" placeholder="手机号 / QQ / 微信"></el-input>
            </div>
            <div class="form-group">
              <label class="form-label">{{ formType==='lost'?'酬谢金额（选填）':'-' }}</label>
              <el-input v-if="formType==='lost'" v-model="form.reward" placeholder="例如：感谢酬金 50 元">
                <template #append>元</template>
              </el-input>
              <el-input v-else disabled placeholder="招领无需设置酬金"></el-input>
            </div>
          </div>

          <div style="display:flex;gap:12px;padding-top:8px;">
            <el-button type="primary" size="large" style="width:180px;" @click="submitForm">🚀 立即发布</el-button>
            <el-button size="large" style="width:120px;">💾 保存草稿</el-button>
            <div style="flex:1;"></div>
            <el-button size="large" onclick="location.href='publish.html'">取消</el-button>
          </div>
        </div>

        <div>
          <div class="side-card">
            <h3>📋 发布须知</h3>
            <div style="font-size:13px;color:#475569;line-height:1.8;">
              · 请如实填写丢失/拾到的时间和地点<br>
              · 描述越详细，找回/认领的概率越高<br>
              · 发布失物时可设置酬谢金额<br>
              · 当物品已找回/归还后请及时标记状态<br>
              · 严禁冒领他人失物，违者封号
            </div>
          </div>
          <div class="side-card" style="background:#FFFBEB;border:1px solid #FDE68A;">
            <h3>⚠️ 重要提醒</h3>
            <div style="font-size:13px;color:#92400E;line-height:1.8;">
              如果拾到校园卡、身份证等重要证件，建议直接交到学校保卫处或失物招领中心，同时在平台发布招领信息。
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive } = Vue
    const app = createApp({
      setup() {
        const formType = ref('lost')
        const form = reactive({ title:'', category:'', location:'', time:'', desc:'', contact:'', reward:'' })
        function submitForm() {
          if (!form.title.trim()) { ElementPlus.ElMessage.warning('请填写物品名称'); return }
          if (!form.category) { ElementPlus.ElMessage.warning('请选择物品分类'); return }
          if (!form.location.trim()) { ElementPlus.ElMessage.warning('请填写地点'); return }
          ElementPlus.ElMessage.success('✅ 发布成功！')
          setTimeout(() => location.href='home.html', 1500)
        }
        return { formType, form, submitForm }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
</script>
</body>
</html>
