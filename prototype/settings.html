<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 账号设置</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; color: #1E293B; }
    .top-nav { display:flex; align-items:center; padding:0 24px; height:60px; background:#fff; box-shadow:0 1px 12px rgba(0,0,0,0.04); position:sticky; top:0; z-index:100; border-bottom:1px solid #F1F5F9; }
    .nav-logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-right:auto; }
    .nav-links { display:flex; gap:4px; }
    .nav-links a { text-decoration:none; color:#475569; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; transition:all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:#3B82F6; background:#EFF6FF; }
    .nav-actions { display:flex; align-items:center; gap:12px; margin-left:16px; }
    .container { max-width:800px; margin:0 auto; padding:24px; }
    .breadcrumb { margin-bottom:20px; font-size:13px; color:#64748B; }
    .breadcrumb a { color:#3B82F6; text-decoration:none; }
    .settings-card { background:#fff; border-radius:16px; padding:32px; box-shadow:0 1px 8px rgba(0,0,0,0.04); }
    .settings-title { font-size:22px; font-weight:700; margin-bottom:28px; padding-bottom:16px; border-bottom:2px solid #F1F5F9; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    .form-group { margin-bottom:20px; }
    .form-label { display:block; font-size:14px; font-weight:600; margin-bottom:6px; }
    .avatar-section { display:flex; align-items:center; gap:20px; margin-bottom:24px; }
    .avatar-preview { width:80px; height:80px; border-radius:50%; overflow:hidden; background:#E2E8F0; }
    .avatar-preview img { width:100%; height:100%; object-fit:cover; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-nav">
      <div class="nav-logo">🏫 校园轻集市</div>
      <div class="nav-links">
        <a href="home.html">首页</a>
        <a href="category.html">分类浏览</a>
        <a href="publish.html">发布信息</a>
        <a href="messages.html">消息</a>
        <a href="profile.html" class="active">个人中心</a>
      </div>
      <div class="nav-actions">
        <el-button size="small" type="primary" onclick="location.href='login.html'">登录</el-button>
      </div>
    </div>

    <div class="container">
      <div class="breadcrumb">
        <a href="home.html">首页</a><span>/</span><a href="profile.html">个人中心</a><span>/</span><span style="color:#1E293B;">账号设置</span>
      </div>

      <div class="settings-card">
        <div class="settings-title">⚙️ 账号设置</div>

        <div class="avatar-section">
          <div class="avatar-preview"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&h=200&fit=crop" alt=""></div>
          <div>
            <el-button size="small">更换头像</el-button>
            <div style="font-size:12px;color:#94A3B8;margin-top:4px;">支持 JPG/PNG，不超过 2MB</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">昵称</label>
            <el-input v-model="form.name" placeholder="你的昵称"></el-input>
          </div>
          <div class="form-group">
            <label class="form-label">手机号</label>
            <el-input v-model="form.phone" placeholder="手机号码"></el-input>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">学院</label>
            <el-select v-model="form.college" placeholder="选择学院" style="width:100%;">
              <el-option label="计算机学院" value="cs"></el-option>
              <el-option label="软件学院" value="se"></el-option>
              <el-option label="电子工程学院" value="ee"></el-option>
              <el-option label="经管学院" value="em"></el-option>
              <el-option label="文学院" value="arts"></el-option>
            </el-select>
          </div>
          <div class="form-group">
            <label class="form-label">校区</label>
            <el-select v-model="form.campus" placeholder="选择校区" style="width:100%;">
              <el-option label="校本部" value="main"></el-option>
              <el-option label="东校区" value="east"></el-option>
              <el-option label="西校区" value="west"></el-option>
            </el-select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">宿舍地址</label>
          <el-input v-model="form.dorm" placeholder="例如：3号楼502"></el-input>
        </div>

        <div class="form-group">
          <label class="form-label">个性签名</label>
          <el-input v-model="form.signature" type="textarea" :rows="2" placeholder="写一句话介绍自己" maxlength="30" show-word-limit></el-input>
        </div>

        <div style="display:flex;gap:12px;padding-top:8px;">
          <el-button type="primary" size="large" @click="saveSettings">💾 保存修改</el-button>
          <el-button size="large" onclick="location.href='profile.html'">取消</el-button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive } = Vue
    const app = createApp({
      setup() {
        const form = reactive({ name:'张三', phone:'138xxxx1234', college:'cs', campus:'main', dorm:'3号楼502', signature:'热爱生活，喜欢分享' })
        function saveSettings() {
          ElementPlus.ElMessage.success('✅ 个人资料已更新！')
        }
        return { form, saveSettings }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
</script>
</body>
</html>
