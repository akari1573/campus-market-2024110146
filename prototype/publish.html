<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 发布信息</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; color: #1E293B; }
    .top-nav { display:flex; align-items:center; padding:0 24px; height:60px; background:#fff; box-shadow:0 1px 12px rgba(0,0,0,0.04); position:sticky; top:0; z-index:100; border-bottom:1px solid #F1F5F9; }
    .nav-logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-right:auto; }
    .nav-links { display:flex; gap:4px; }
    .nav-links a { text-decoration:none; color:#475569; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; transition:all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color:#3B82F6; background:#EFF6FF; }
    .nav-actions { display:flex; align-items:center; gap:12px; margin-left:16px; }
    .container { max-width:900px; margin:0 auto; padding:24px; }
    .page-header { text-align:center; margin-bottom:40px; }
    .page-header h1 { font-size:28px; font-weight:700; margin-bottom:8px; }
    .page-header p { font-size:14px; color:#64748B; }
    .type-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:32px; }
    .type-card { background:#fff; border-radius:16px; padding:32px 24px; text-align:center; cursor:pointer; text-decoration:none; color:inherit; box-shadow:0 1px 8px rgba(0,0,0,0.04); transition:all 0.2s; border:2px solid transparent; }
    .type-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,0.1); }
    .type-card:nth-child(1):hover { border-color:#3B82F6; }
    .type-card:nth-child(2):hover { border-color:#EF4444; }
    .type-card:nth-child(3):hover { border-color:#10B981; }
    .type-card:nth-child(4):hover { border-color:#F59E0B; }
    .type-icon { font-size:48px; margin-bottom:16px; }
    .type-name { font-size:18px; font-weight:700; margin-bottom:8px; }
    .type-desc { font-size:13px; color:#64748B; line-height:1.6; }
    .info-box { background:#EFF6FF; border:1px solid #BFDBFE; border-radius:12px; padding:16px 20px; font-size:13px; color:#1E40AF; line-height:1.8; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-nav">
      <div class="nav-logo">🏫 校园轻集市</div>
      <div class="nav-links">
        <a href="home.html">首页</a>
        <a href="category.html">分类浏览</a>
        <a href="publish.html" class="active">发布信息</a>
        <a href="messages.html">消息</a>
        <a href="profile.html">个人中心</a>
      </div>
      <div class="nav-actions">
        <el-button size="small" type="primary" onclick="location.href='login.html'">登录</el-button>
        <el-button size="small" onclick="location.href='register.html'">注册</el-button>
      </div>
    </div>

    <div class="container">
      <div class="page-header">
        <h1>📝 发布信息</h1>
        <p>选择你要发布的信息类型，开始分享你的校园需求</p>
      </div>

      <div class="type-grid">
        <a href="publish-item.html" class="type-card">
          <div class="type-icon">🛒</div>
          <div class="type-name">发布二手商品</div>
          <div class="type-desc">出售闲置书籍、数码产品、生活用品等，让闲置流转起来</div>
        </a>
        <a href="publish-lost.html" class="type-card">
          <div class="type-icon">🔍</div>
          <div class="type-name">发布失物招领</div>
          <div class="type-desc">丢失物品寻找帮助，或发布拾到物品等待失主认领</div>
        </a>
        <a href="publish-group.html" class="type-card">
          <div class="type-icon">🤝</div>
          <div class="type-name">发布拼单搭子</div>
          <div class="type-desc">找人拼单、约饭、组队运动、拼车出行，一起更划算</div>
        </a>
        <a href="publish-task.html" class="type-card">
          <div class="type-icon">🏃</div>
          <div class="type-name">发布跑腿委托</div>
          <div class="type-desc">发布取快递、带饭、打印等任务，找人帮忙快速搞定</div>
        </a>
      </div>

      <div class="info-box">
        📋 <strong>发布须知：</strong>请确保信息真实有效。二手商品请如实描述成色和使用情况；失物招领请提供详细的时间和地点信息；拼单搭子请明确人数和截止时间；跑腿委托请合理设置报酬。发布违规或虚假信息将被平台处理。
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue
    const app = createApp({})
    app.use(ElementPlus)
    app.mount('#app')
</script>
</body>
</html>
