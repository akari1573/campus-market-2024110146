<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 注册</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:linear-gradient(135deg,#1E40AF,#3B82F6,#0EA5E9); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .register-wrap { width:430px; background:#fff; border-radius:22px; padding:40px; box-shadow:0 24px 72px rgba(0,0,0,0.18); }
    .logo-area { text-align:center; margin-bottom:30px; }
    .logo-area .logo { font-size:30px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-area p { font-size:14px; color:#64748B; margin-top:8px; }
    .form-group { margin-bottom:20px; }
    .form-row { display:grid; grid-template-columns:1fr 140px; gap:12px; margin-bottom:20px; }
    .agreement { font-size:12px; color:#64748B; margin-bottom:22px; line-height:1.6; }
    .agreement a { color:#3B82F6; text-decoration:none; }
  </style>
</head>
<body>
  <div id="app">
    <div class="register-wrap">
      <div class="logo-area">
        <div class="logo">🏫 校园轻集市</div>
        <p>创建账号，开启校园生活新方式</p>
      </div>

      <div class="form-group">
        <el-input v-model="form.name" placeholder="请输入昵称" size="large"><template #prefix>👤</template></el-input>
      </div>
      <div class="form-row">
        <el-input v-model="form.phone" placeholder="请输入手机号" size="large"><template #prefix>📱</template></el-input>
        <el-button size="large">获取验证码</el-button>
      </div>
      <div class="form-group">
        <el-input v-model="form.code" placeholder="请输入验证码" size="large"><template #prefix>📩</template></el-input>
      </div>
      <div class="form-group">
        <el-input v-model="form.password" type="password" placeholder="请设置密码（6-20位）" size="large" show-password><template #prefix>🔒</template></el-input>
      </div>
      <div class="form-group">
        <el-input v-model="form.confirmPassword" type="password" placeholder="请确认密码" size="large" show-password><template #prefix>🔒</template></el-input>
      </div>
      <div class="agreement">
        <el-checkbox v-model="form.agreed" size="small">我已阅读并同意</el-checkbox>
        <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a>
      </div>
      <el-button type="primary" size="large" style="width:100%;height:46px;font-size:16px;font-weight:600;" @click="doRegister">注 册</el-button>

      <div style="text-align:center;margin-top:22px;font-size:13px;color:#64748B;">
        已有账号？<a href="login.html" style="color:#3B82F6;text-decoration:none;font-weight:600;">立即登录</a>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive } = Vue
    const app = createApp({
      setup() {
        const form = reactive({ name:'', phone:'', code:'', password:'', confirmPassword:'', agreed:false })
        function doRegister() {
          if (!form.name.trim()) { ElementPlus.ElMessage.warning('请输入昵称'); return }
          if (!form.phone.trim()) { ElementPlus.ElMessage.warning('请输入手机号'); return }
          if (!form.code.trim()) { ElementPlus.ElMessage.warning('请输入验证码'); return }
          if (form.password !== form.confirmPassword) { ElementPlus.ElMessage.warning('两次密码不一致'); return }
          if (!form.agreed) { ElementPlus.ElMessage.warning('请同意用户协议'); return }
          ElementPlus.ElMessage.success('🎉 注册成功！正在跳转...')
          setTimeout(() => location.href='home.html', 1000)
        }
        return { form, doRegister }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
  </script>
</body>
</html>
