<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园轻集市 - 登录</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:linear-gradient(135deg,#1E40AF,#3B82F6,#0EA5E9); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-wrap { width:430px; background:#fff; border-radius:22px; padding:44px; box-shadow:0 24px 72px rgba(0,0,0,0.18); }
    .logo-area { text-align:center; margin-bottom:34px; }
    .logo-area .logo { font-size:30px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#06B6D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-area p { font-size:14px; color:#64748B; margin-top:8px; }
    .form-group { margin-bottom:22px; }
    .form-options { display:flex; justify-content:space-between; align-items:center; margin-bottom:26px; font-size:13px; }
    .form-options a { color:#3B82F6; text-decoration:none; }
    .social-login { text-align:center; margin-top:26px; padding-top:26px; border-top:1px solid #F1F5F9; }
    .social-btns { display:flex; justify-content:center; gap:16px; margin-top:14px; }
    .social-btn { width:46px; height:46px; border-radius:50%; border:1.5px solid #E2E8F0; background:#fff; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; transition:all 0.25s; }
    .social-btn:hover { border-color:#3B82F6; background:#EFF6FF; }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-wrap">
      <div class="logo-area">
        <div class="logo">🏫 校园轻集市</div>
        <p>校园二手交易与生活服务平台</p>
      </div>

      <div class="form-group">
        <el-input v-model="form.phone" placeholder="请输入手机号" size="large" clearable>
          <template #prefix>📱</template>
        </el-input>
      </div>
      <div class="form-group">
        <el-input v-model="form.password" type="password" placeholder="请输入密码" size="large" show-password>
          <template #prefix>🔒</template>
        </el-input>
      </div>
      <div class="form-options">
        <el-checkbox v-model="form.remember" size="small">记住密码</el-checkbox>
        <a href="#">忘记密码？</a>
      </div>
      <el-button type="primary" size="large" style="width:100%;height:46px;font-size:16px;font-weight:600;" @click="doLogin">登 录</el-button>

      <div class="social-login">
        <div style="font-size:13px;color:#94A3B8;">其他方式登录</div>
        <div class="social-btns">
          <button class="social-btn">📱</button>
          <button class="social-btn">💬</button>
          <button class="social-btn">📧</button>
        </div>
      </div>

      <div style="text-align:center;margin-top:22px;font-size:13px;color:#64748B;">
        还没有账号？<a href="register.html" style="color:#3B82F6;text-decoration:none;font-weight:600;">立即注册</a>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, reactive } = Vue
    const app = createApp({
      setup() {
        const form = reactive({ phone:'', password:'', remember:false })
        function doLogin() {
          if (!form.phone.trim()) { ElementPlus.ElMessage.warning('请输入手机号'); return }
          if (!form.password.trim()) { ElementPlus.ElMessage.warning('请输入密码'); return }
          ElementPlus.ElMessage.success('✅ 登录成功！正在跳转...')
          setTimeout(() => location.href='home.html', 1000)
        }
        return { form, doLogin }
      }
    })
    app.use(ElementPlus)
    app.mount('#app')
  </script>
</body>
</html>
